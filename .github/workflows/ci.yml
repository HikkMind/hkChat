name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

env:
  GO_VERSION: '1.21'

jobs:
  lint:
    name: Lint Go code
    runs-on: ubuntu-latest
    timeout-minutes: 5

    strategy:
      matrix:
        module: [auth, connection, datagate]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Download dependencies
        run: |
          go clean -modcache
          go mod download
          go mod tidy
        working-directory: ./${{ matrix.module }}
      
      - name: Run linter
        uses: golangci/golangci-lint-action@v3
        with:
          version: v1.64.8
          working-directory: ./${{ matrix.module }}
          args: --timeout=5m --build-tags= --disable-all --enable=govet,staticcheck
          skip-pkg-cache: true
          skip-build-cache: true

  build-check:
    name: Build check
    runs-on: ubuntu-latest
    needs: [lint]
    
    strategy:
      matrix:
        module: [auth, connection, datagate]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # - name: Download dependencies
      #   run: go mod download
      #   working-directory: ./${{ matrix.module }}
      - name: Handle shared module
        run: |
          mkdir -p shared
          cp -r ../shared/* shared/
          
          go mod edit -replace hkchat/proto=./shared/proto
          go mod edit -replace hkchat/structs=./shared/structs
          
          go mod tidy
          go mod download
        working-directory: ./${{ matrix.module }}
      
      - name: Build
        run: go build -v -o /dev/null ./...
        working-directory: ./${{ matrix.module }}
      
      - name: Docker build test
        run: docker build -t test-build --target builder -f ${{ matrix.module }}/Dockerfile.${{ matrix.module }} .
        working-directory: ./