name: CD

on:
  push: 
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert owner to lowercase
        id: vars
        run: echo "owner=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Set environment variables for docker-compose
        run: |
          echo "TAG=${{ github.sha }}" >> $GITHUB_ENV

      - name: Decode config
        run: |
          echo "${{ secrets.REDIS_CONFIG }}" | base64 -d > redis/redis.config
          echo "${{ secrets.POSTGRES_CONFIG }}" | base64 -d > postgres/postgres.config
          echo "${{ secrets.DB_ENV }}" | base64 -d > datagate/.dbenv
          echo "${{ secrets.AUTH_ENV }}" | base64 -d > shared/env/auth
          echo "${{ secrets.RABBIT_ENV }}" | base64 -d > shared/env/rabbitmq

      - name: Build all services
        run: docker compose build --parallel

      - name: Push all services
        run: docker compose push